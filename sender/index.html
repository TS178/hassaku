<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>神輿GPS送信</title>
<style>
  :root{ --ai:#1f3a5f; --shu:#d7402b; --ok:#2e7d32; --ng:#c62828; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{
    margin:0; font-family:system-ui,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--ai); color:#fff; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; padding:16px;
  }
  h1{ font-size:20px; letter-spacing:.1em; margin:8px 0 4px; }
  .sub{ font-size:12px; opacity:.8; margin-bottom:16px; }
  .card{ width:100%; max-width:420px; background:#fff; color:#222; border-radius:14px;
    padding:18px; box-shadow:0 6px 20px rgba(0,0,0,.3); }
  label{ font-size:13px; font-weight:700; display:block; margin-bottom:6px; }
  select{ width:100%; font-size:20px; padding:14px; border:2px solid #ccc; border-radius:10px;
    background:#fff; margin-bottom:16px; }
  select option:disabled{ color:#bbb; }
  .btns{ display:flex; gap:10px; }
  button{ flex:1; font-size:18px; font-weight:800; padding:18px 0; border:none; border-radius:12px;
    color:#fff; cursor:pointer; }
  #startBtn{ background:var(--shu); }
  #stopBtn{ background:#777; }
  button:disabled{ opacity:.4; }
  #status{ margin-top:16px; padding:16px; border-radius:10px; font-size:16px; font-weight:800;
    text-align:center; background:#eee; color:#333; }
  #status.on{ background:#e8f5e9; color:var(--ok); }
  #status.err{ background:#ffebee; color:var(--ng); }
  .big{ font-size:28px; display:block; margin-bottom:4px; }
  #log{ margin-top:14px; font-size:12px; color:#555; max-height:150px; overflow:auto;
    background:#f6f6f6; border-radius:8px; padding:10px; line-height:1.6; }
  .note{ font-size:12px; opacity:.85; max-width:420px; margin-top:14px; line-height:1.7; }
</style>
</head>
<body>
  <h1>🏮 神輿GPS送信</h1>
  <div class="sub">この端末が乗る神輿を選んで「送信開始」を押してください</div>

  <div class="card">
    <label for="mikoshiSelect">この端末の神輿</label>
    <select id="mikoshiSelect"></select>

    <div class="btns">
      <button id="startBtn">送信開始</button>
      <button id="stopBtn" disabled>停止</button>
    </div>

    <div id="status"><span class="big">⏸</span>待機中</div>
    <div id="log"></div>
  </div>

  <div class="note">
    ・「他端末が使用中」の神輿は選べません（二重送信の防止）<br>
    ・画面はつけたままにしてください（自動で消えないようにします）<br>
    ・充電しながらの使用を推奨します
  </div>

<script src="../js/config.js"></script>
<script>
  const $  = (id) => document.getElementById(id);
  const sel = $("mikoshiSelect");

  // この端末の固有トークン（担当ロック用。端末ごとに一意）
  let TOKEN = localStorage.getItem("deviceToken");
  if (!TOKEN){ TOKEN = "d-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem("deviceToken", TOKEN); }

  // 神輿リストを選択肢に反映
  CONFIG.MIKOSHI.forEach(m => {
    const o = document.createElement("option");
    o.value = m.id; o.textContent = m.id + " ： " + m.name;
    sel.appendChild(o);
  });
  const saved = localStorage.getItem("mikoshiId");
  if (saved) sel.value = saved;

  let watchId = null, timer = null, lastPos = null, wakeLock = null, takenTimer = null;

  function setStatus(mark, msg, cls){
    const s = $("status"); s.className = cls || "";
    s.innerHTML = '<span class="big">' + mark + '</span>' + msg;
  }
  function log(msg){
    const t = new Date().toLocaleTimeString("ja-JP");
    $("log").innerHTML = "[" + t + "] " + msg + "<br>" + $("log").innerHTML;
  }

  // 使用中の神輿を選択肢から無効化（送信していない時だけ更新）
  async function refreshTaken(){
    if (watchId !== null) return;              // 送信中は触らない
    try{
      const url = CONFIG.GAS_URL + (CONFIG.GAS_URL.includes("?") ? "&" : "?") + "_=" + Date.now();
      const j = await (await fetch(url)).json();
      const now = j.server || Date.now();
      const taken = {};
      (j.mikoshi || []).forEach(d => {
        if (d.updated && (now - d.updated) / 1000 < CONFIG.CLAIM_SEC) taken[d.id] = true;
      });
      const own = localStorage.getItem("mikoshiId");
      [...sel.options].forEach(o => {
        const m = CONFIG.MIKOSHI.find(x => x.id === o.value);
        const base = o.value + " ： " + (m ? m.name : "");
        if (taken[o.value] && o.value !== own){ o.textContent = base + "（他端末が使用中）"; o.disabled = true; }
        else { o.textContent = base; o.disabled = false; }
      });
      if (sel.selectedOptions[0] && sel.selectedOptions[0].disabled){
        const first = [...sel.options].find(o => !o.disabled);
        if (first) sel.value = first.value;
      }
    }catch(_){}
  }

  async function requestWakeLock(){
    try{ if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); }
    catch(e){}
  }
  document.addEventListener("visibilitychange", () => {
    if (wakeLock !== null && document.visibilityState === "visible") requestWakeLock();
  });

  async function start(){
    if (!("geolocation" in navigator)){ setStatus("⚠","この端末はGPS非対応です","err"); return; }
    if (sel.selectedOptions[0] && sel.selectedOptions[0].disabled){
      setStatus("⚠","この神輿は別の端末が送信中です","err"); return;
    }
    localStorage.setItem("mikoshiId", sel.value);
    sel.disabled = true; $("startBtn").disabled = true; $("stopBtn").disabled = false;
    setStatus("📡","GPSを取得しています…","");
    await requestWakeLock();

    watchId = navigator.geolocation.watchPosition(
      p => { lastPos = p; setStatus("🟢","送信中（精度 ±" + Math.round(p.coords.accuracy) + "m）","on"); },
      err => { setStatus("⚠","GPSエラー：" + err.message,"err"); },
      { enableHighAccuracy:true, maximumAge:10000, timeout:20000 }
    );
    send();
    timer = setInterval(send, CONFIG.SEND_INTERVAL);
  }

  function stop(){
    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
    if (timer) clearInterval(timer);
    if (wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; }
    watchId = timer = null;
    sel.disabled = false; $("startBtn").disabled = false; $("stopBtn").disabled = true;
    setStatus("⏸","停止しました","");
    refreshTaken();
  }

  // 別端末に取られていた場合の処理
  function onBlocked(){
    stop();
    setStatus("🚫","この神輿は別の端末が送信中です。別の神輿を選んでください","err");
    log("送信拒否：別端末が使用中");
  }

  function send(){
    if (!lastPos){ log("まだ位置が取れていません（再試行します）"); return; }
    const m = CONFIG.MIKOSHI.find(x => x.id === sel.value);
    const body = JSON.stringify({
      key:  CONFIG.API_KEY,
      token: TOKEN,
      id:   sel.value,
      name: m ? m.name : "",
      lat:  lastPos.coords.latitude,
      lng:  lastPos.coords.longitude,
      speed: lastPos.coords.speed,
      acc:  lastPos.coords.accuracy
    });
    fetch(CONFIG.GAS_URL, { method:"POST", body: body })
      .then(async r => {
        let d = {};
        try{ d = await r.json(); }catch(_){ log("送信しました（応答は確認できませんでした）"); return; }
        if (d.ok) log("送信成功");
        else if (d.error === "in_use") onBlocked();
        else log("サーバー応答：" + (d.error || "不明"));
      })
      .catch(e => log("通信エラー：" + e.message));
  }

  $("startBtn").onclick = start;
  $("stopBtn").onclick  = stop;

  refreshTaken();
  takenTimer = setInterval(refreshTaken, 15000);
</script>
</body>
</html>
